version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:15
    container_name: order-db
    environment:
      POSTGRES_PASSWORD: "000"
      POSTGRES_DB: order_db
    ports:
      - "5432:5432"

  payment-db:
    image: postgres:15
    container_name: payment-db
    environment:
      POSTGRES_PASSWORD: "000"
      POSTGRES_DB: payment_db
    ports:
      - "5433:5432"

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      rabbitmq:
        condition: service_healthy
      payment-db:
        condition: service_started
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - DATABASE_URL=postgres://postgres:000@payment-db:5432/payment_db?sslmode=disable

  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - order-db
      - payment-service
    environment:
      - DATABASE_URL=postgres://postgres:000@order-db:5432/order_db?sslmode=disable
      - PAYMENT_GRPC_ADDR=payment-service:50051